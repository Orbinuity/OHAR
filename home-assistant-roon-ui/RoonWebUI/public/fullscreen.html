<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Roon Web UI</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/favicons/apple-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function(a, b, c) {
        if (c in b && b[c]) {
          var d,
            e = a.location,
            f = /^(a|html)$/i;
          a.addEventListener(
            "click",
            function(a) {
              d = a.target;
              while (!f.test(d.nodeName)) d = d.parentNode;
              "href" in d &&
                (d.href.indexOf("http") || ~d.href.indexOf(e.host)) &&
                (a.preventDefault(), (e.href = d.href));
            },
            !1
          );
        }
      })(document, window.navigator, "standalone");
    </script>
    <link
      rel="shortcut icon"
      href="/favicons/favicon.ico"
      type="image/x-icon"
    />
    <link rel="icon" href="/favicons/favicon.ico" type="image/x-icon" />
    <link rel="manifest" href="/favicons/manifest.json" />
    <link rel="stylesheet" type="text/css" href="/css/site.css" />
    <script src="/jquery/jquery.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/fullscreen.js"></script>

    <style>
      iframe {
        border: none;
      }

      .section {
        height: 100%;
        width: 100%;
      }

      #pageLoading {
        background-color: #232629;
        color: #eff0f1;
        z-index: 1000;
      }

      #topNavContainer {
        position: absolute;
        top: 12px;
        right: 16px;
        display: flex;
        gap: 8px;
        z-index: 2000;
      }

      .navHeaderBtn {
        background-color: rgba(0, 0, 0, 0.4);
        color: #a1a2a3;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 18px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        outline: none;
      }

      .navHeaderBtn:hover {
        background-color: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.2);
      }

      .navHeaderBtn.active-nav {
        background-color: var(--primary-color);
        color: #ffffff;
        border-color: var(--primary-color);
        box-shadow: 0 2px 10px color-mix(in srgb, var(--primary-color) 25%, transparent);
      }

      /* Light Mode Overrides for Top Nav */
      .theme-light .navHeaderBtn {
        background-color: rgba(0, 0, 0, 0.06);
        color: #5f6368;
        border-color: rgba(0, 0, 0, 0.08);
      }

      .theme-light .navHeaderBtn:hover {
        background-color: rgba(0, 0, 0, 0.12);
        color: #111111;
        border-color: rgba(0, 0, 0, 0.15);
      }

      /* Light Mode Overrides for Top Nav */
      .theme-light .navHeaderBtn.active-nav {
        background-color: var(--primary-color);
        color: #ffffff;
        border-color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <div id="nowPlaying" class="fullscreenFlex">
      <iframe class="section" src="nowplaying.html"></iframe>
    </div>

    <div id="libraryBrowser" class="fullscreenFlex">
      <iframe class="section" src="library.html"></iframe>
    </div>

    <div id="pairDisabled" class="fullscreenFlex">
      <div class="messages">
        This extension is not enabled. Please use a Roon client to enable it.
      </div>
    </div>

    <div id="topNavContainer" style="display: none;">
      <button type="button" id="navBtnNowPlaying" class="navHeaderBtn" onclick="showSection('nowPlaying')" name="Show Now Playing" aria-label="Show Now Playing">Now Playing</button>
      <button type="button" id="navBtnLibrary" class="navHeaderBtn" onclick="showSection('libraryBrowser')" name="Show Library" aria-label="Show Library">Library</button>
    </div>

    <div id="pageLoading" class="fullscreenFlex">&nbsp;</div>
  </body>
</html>
