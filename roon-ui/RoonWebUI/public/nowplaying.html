<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Roon Web UI - Now Playing</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/favicons/apple-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function(a, b, c) {
        if (c in b && b[c]) {
          var d, e = a.location, f = /^(a|html)$/i;
          a.addEventListener("click", function(a) {
            d = a.target;
            while (!f.test(d.nodeName)) d = d.parentNode;
            "href" in d && (d.href.indexOf("http") || ~d.href.indexOf(e.host)) && (a.preventDefault(), (e.href = d.href));
          }, !1);
        }
      })(document, window.navigator, "standalone");
    </script>
    <link rel="shortcut icon" href="/favicons/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/favicons/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="/css/site.css" />
    <link rel="stylesheet" type="text/css" href="/css/nowplaying.css" />
    <script src="/jquery/jquery.min.js"></script>
    <script src="/js/jquery.simplemarquee.js"></script>
    <script src="/js/color-thief.js"></script>
    <script src="/js-cookie/js.cookie.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/NoSleep.min.js"></script>
    <script src="/js/nowplaying.js"></script>
    <script>
      $(window).on("orientationchange", function() { fixFontSize(); });
      $(window).resize(function() { fixFontSize(); });
    </script>
  </head>
  <body>
    <div id="navLine1">
      <div class="navGroup navLeft">
        <button type="button" id="buttonBack" class="navButton" disabled="true" aria-disabled="true">
          <svg viewBox="0 0 24.00 24.00"><path d="M 20,11L 20,13L 7.98958,13L 13.4948,18.5052L 12.0806,19.9194L 4.16116,12L 12.0806,4.08058L 13.4948,5.49479L 7.98958,11L 20,11 Z "/></svg>
        </button>
        <button type="button" id="buttonHome" class="navButton" disabled="true" aria-disabled="true">
          <svg viewBox="0 0 24.00 24.00"><path d="M 9.99939,19.998L 9.99939,13.998L 13.9994,13.998L 13.9994,19.998L 18.9994,19.998L 18.9994,11.998L 21.9994,11.998L 11.9994,2.99805L 1.99939,11.998L 4.99939,11.998L 4.99939,19.998L 9.99939,19.998 Z "/></svg>
        </button>
        <button type="button" id="buttonRefresh" class="navButton" onclick="window.location.reload();" name="Refresh Page" aria-label="Refresh Page">
          <svg viewBox="0 0 24.00 24.00"><path d="M 17.65,6.35C 16.2,4.9 14.21,4 12,4C 7.58,4 4.01,7.58 4.01,12C 4.01,16.42 7.58,20 12,20C 15.73,20 18.84,17.45 19.73,14L 17.65,14C 16.83,16.33 14.61,18 12,18C 8.69,18 6,15.31 6,12C 6,8.69 8.69,6 12,6C 13.66,6 15.14,6.69 16.22,7.78L 13,11L 20,11L 20,4L 17.65,6.35 Z "/></svg>
        </button>
        
        <div id="containerZoneList">
          <button type="button" class="buttonZoneName" id="nowplayingZoneList" onclick="$('#overlayZoneList').show()">
            zoneList
          </button>
        </div>
      </div>
    </div>

    <div id="coverBackground"></div>
    <div id="colorBackground"></div>
    
    <div id="notPlaying" style="display: none;">
      <div class="idleContainer">
        <div class="idleIconWrapper">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </div>
        <h1 class="idleHeadline">Nothing playing right now</h1>
        <button type="button" class="idleZoneButton buttonZoneName" onclick="$('#overlayZoneList').show()">Select Speaker</button>
      </div>
    </div>

    <div id="isPlaying">
      <div id="playerLeftColumn">
        <div id="containerCoverImage"></div>
        
        <div id="containerMusicInfo">
          <div id="line1" class="colorChange textBold lineMusicInfo">&nbsp;</div>
          <div id="line2" class="colorChange lineMusicInfo">&nbsp;</div>
          <div id="line3" class="colorChange lineMusicInfo">&nbsp;</div>
          
          <div id="containerTrackSeek">
            <div id="trackSeek">
              <div id="trackSeekValue">
                <span id="seekPosition" class="left">&nbsp;</span>
                <span id="seekLength" class="right">&nbsp;</span>
              </div>
            </div>
          </div>
          
          <div id="controlsPlayer">
            <button type="button" id="controlPrev" class="buttonPartialHeight playerButton" name="Previous" aria-label="Previous" data-tooltip="Previous Track"></button>
            <button type="button" id="controlPlayPauseStop" class="buttonFillHeight playerButton" name="Play Pause" aria-label="Play Pause" data-tooltip="Play / Pause"></button>
            <button type="button" id="controlNext" class="buttonPartialHeight playerButton" name="Next" aria-label="Next" data-tooltip="Next Track"></button>
          </div>
          
          <div id="controlsSettings">
            <button type="button" class="buttonFillHeight settingsButton" id="buttonLoop" data-tooltip="Repeat Mode"></button>
            <button type="button" class="buttonFillHeight settingsButton" id="buttonShuffle" data-tooltip="Shuffle Playlist"></button>
            <button type="button" class="buttonFillHeight settingsButton" id="buttonRadio" data-tooltip="Roon Radio"></button>
            <button type="button" class="buttonFillHeight settingsButton buttonAvailable" id="buttonVolume" onclick="$('#overlayVolume').show()" name="Show Volume Controls" aria-label="Show Volume Controls" data-tooltip="Adjust Volume"></button>
            <button type="button" class="buttonFillHeight settingsButton buttonAvailable" id="buttonSettings" onclick="$('#overlaySettings').show()" name="Show Settings" aria-label="Show Settings" data-tooltip="Display Settings"></button>
          </div>
        </div>
      </div>

      <div id="playerRightColumn">
        <div class="queueHeader textBold">Queue</div>
        <div id="queueList"></div>
      </div>
    </div>

    <div id="overlayVolume" class="overlay">
      <div class="overlayBackground" onclick="$('#overlayVolume').hide()"></div>
      <div class="overlayContent"><span id="volumeList"></span></div>
    </div>
    <div id="overlayZoneList" class="overlay">
      <div class="overlayBackground" onclick="$('#overlayZoneList').hide()"></div>
      <div class="overlayContent"><span class="overlayList zoneList"></span></div>
    </div>
    <div id="overlaySettings" class="overlay">
      <div class="overlayBackground" onclick="$('#overlaySettings').hide()"></div>
      <div class="overlayContent">
        <div class="overlayList settingsList">
          <!-- --- REPLACE THE THEME BUTTONS ROW IN NOWPLAYING.HTML WITH THIS --- -->
          <div class="overlayListRow" style="align-items: center;">
            <div class="textBold">Appearance</div>
            <div class="segmented-control">
              <button type="button" class="btn-segment" id="themeBtnLight" onclick="setAppTheme('light')" name="Light Mode" aria-label="Light Mode">Light</button>
              <button type="button" class="btn-segment" id="themeBtnDark" onclick="setAppTheme('dark')" name="Dark Mode" aria-label="Dark Mode">Dark</button>
              <button type="button" class="btn-segment" id="themeBtnSystem" onclick="setAppTheme('system')" name="System Default" aria-label="System Default">System</button>
            </div>
          </div>
          <hr />
          <div class="overlayListRow">
            <div class="textBold">Primary Accent Color</div>
            <div style="display: flex; gap: 12px; align-items: center;">
              <button type="button" class="btn-segment" onclick="resetPrimaryColor()" style="padding: 4px 12px; font-size: 12px;">Reset</button>
              <input type="color" id="primaryColorPicker" onchange="changePrimaryColor(this.value)" style="background: transparent; border: none; cursor: pointer; height: 32px; width: 32px; padding: 0;">
            </div>
          </div>
          <hr />
          <div class="overlayListRow">
            <div class="textBold">Notifications</div>
            <div>
              <label class="settingsSwitch">
                <input type="checkbox" id="notificationsSwitch" onclick="toggleNotifications()" name="Toggle desktop notifications" aria-label="Toggle desktop notifications" />
                <span class="settingsSlider"></span>
              </label>
            </div>
          </div>
          <hr />
          <div class="overlayListRow">
            <div class="textBold">Use Circle Icons</div>
            <div>
              <label class="settingsSwitch">
                <input type="checkbox" id="circleIconsSwitch" onclick="toggleCircleIcon()" name="Toggle circle icons" aria-label="Toggle circle icons" />
                <span class="settingsSlider"></span>
              </label>
            </div>
          </div>
          <hr />
          <div class="overlayListRow">
            <div class="textBold">Use 4k Images</div>
            <div>
              <label class="settingsSwitch">
                <input type="checkbox" id="4kImagesSwitch" onclick="toggle4kImages()" name="Toggle 4k images" aria-label="Toggle 4k images" />
                <span class="settingsSlider"></span>
              </label>
            </div>
          </div>
          <hr />
          <div class="overlayListRow">
            <div class="textBold">Disable screensaver while playing</div>
            <div>
              <label class="settingsSwitch">
                <input type="checkbox" id="screensaverSwitch" onclick="toggleScreensaver()" name="Toggle screen saver inhibition" aria-label="Toggle screen saver inhibition" />
                <span class="settingsSlider"></span>
              </label>
            </div>
          </div>
          <hr />
        </div>
      </div>
    </div>
  </body>
</html>
